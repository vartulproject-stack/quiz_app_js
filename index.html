<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Day 10/100 - Quiz App</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f172a; color: white;
      font-family: 'Segoe UI', Arial, sans-serif;
      padding: 20px; min-height: 100vh;
      display: flex; justify-content: center; align-items: center;
    }
 .quiz-container {
      width: 100%; max-width: 600px;
      background: #1e293b; padding: 30px;
      border-radius: 15px;
      box-shadow: 0 0 30px rgba(56, 189, 248, 0.2);
    }
 .tag { color: #22c55e; font-size: 14px; text-align: center; margin-bottom: 10px; }
    h2 { text-align: center; color: #38bdf8; margin-bottom: 10px; }
 .question-count { text-align: center; color: #94a3b8; margin-bottom: 20px; font-size: 14px; }
 .question { font-size: 20px; margin: 20px 0; color: #e2e8f0; line-height: 1.4; }
 .options { display: flex; flex-direction: column; gap: 12px; margin: 25px 0; }
 .option {
      background: #334155; padding: 15px; border-radius: 8px;
      cursor: pointer; border: 2px solid transparent; transition: 0.2s;
    }
 .option:hover { background: #475569; border-color: #38bdf8; }
 .option.correct { background: #22c55e; border-color: #22c55e; }
 .option.wrong { background: #ef4444; border-color: #ef4444; }
    button {
      width: 100%; background: #22c55e; color: white;
      border: none; padding: 15px; border-radius: 8px;
      cursor: pointer; font-weight: bold; font-size: 16px; margin-top: 10px;
    }
    button:hover { background: #16a34a; }
    button:disabled { background: #475569; cursor: not-allowed; }
 .result { text-align: center; }
 .result h3 { font-size: 28px; color: #38bdf8; margin: 20px 0; }
 .score { font-size: 48px; color: #22c55e; margin: 20px 0; }
 .message { font-size: 18px; color: #94a3b8; margin: 15px 0; }
 .hide { display: none; }
  </style>
</head>
<body>
  <div class="quiz-container">
    <p class="tag">Day 10/100 #100DaysOfCode</p>
    <h2>JavaScript Quiz 🧠</h2>

    <div id="quiz-box">
      <p class="question-count" id="question-count">Question 1 of 5</p>
      <div class="question" id="question">Loading...</div>
      <div class="options" id="options"></div>
      <button id="next-btn" onclick="nextQuestion()" disabled>Next Question</button>
    </div>

    <div id="result-box" class="result hide">
      <h3>Quiz Complete! 🎉</h3>
      <div class="score" id="score">0/5</div>
      <p class="message" id="message">Good job bhai!</p>
      <button onclick="restartQuiz()">Play Again</button>
    </div>
  </div>

  <script>
    const questions = [
      { q: "JavaScript mein array banane ka sahi syntax kya hai?",
        options: ["var arr = []", "var arr = {}", "var arr = ()", "var arr = <>"], answer: 0 },
      { q: "DOM ka full form kya hai?",
        options: ["Data Object Model", "Document Object Model", "Desktop Object Model", "Digital Ordinance Model"], answer: 1 },
      { q: "Kaunsa method array ke end mein element add karta hai?",
        options: ["shift()", "unshift()", "push()", "pop()"], answer: 2 },
      { q: "console.log(typeof null) kya return karega?",
        options: ["null", "undefined", "object", "string"], answer: 2 },
      { q: "Event listener add karne ka sahi tarika?",
        options: ["element.onclick()", "element.addEventListener()", "element.addEvent()", "element.listener()"], answer: 1 }
    ];

    let currentQ = 0, score = 0, selectedOption = null;

    function loadQuestion() {
      selectedOption = null;
      document.getElementById('next-btn').disabled = true;
      const q = questions[currentQ];
      document.getElementById('question-count').textContent = `Question ${currentQ + 1} of ${questions.length}`;
      document.getElementById('question').textContent = q.q;
      const optionsDiv = document.getElementById('options');
      optionsDiv.innerHTML = '';
      q.options.forEach((option, index) => {
        optionsDiv.innerHTML += `<div class="option" onclick="selectOption(${index})">${option}</div>`;
      });
    }

    function selectOption(index) {
      if(selectedOption!== null) return;
      selectedOption = index;
      const options = document.querySelectorAll('.option');
      const correct = questions[currentQ].answer;
      options.forEach((opt, i) => {
        if(i === correct) opt.classList.add('correct');
        else if(i === index) opt.classList.add('wrong');
      });
      if(index === correct) score++;
      document.getElementById('next-btn').disabled = false;
    }

    function nextQuestion() {
      currentQ++;
      if(currentQ < questions.length) loadQuestion();
      else showResult();
    }

    function showResult() {
      document.getElementById('quiz-box').classList.add('hide');
      document.getElementById('result-box').classList.remove('hide');
      document.getElementById('score').textContent = `${score}/${questions.length}`;
      let msg = "";
      if(score === 5) msg = "Perfect! Bhai tu to JS ka king hai 😭👑";
      else if(score >= 3) msg = "Solid! Dubai ready ho raha hai 💎🇦🇪";
      else msg = "Practice kar bhai, ho jayega 🫡";
      document.getElementById('message').textContent = msg;
    }

    function restartQuiz() {
      currentQ = 0; score = 0;
      document.getElementById('quiz-box').classList.remove('hide');
      document.getElementById('result-box').classList.add('hide');
      loadQuestion();
    }

    loadQuestion();
  </script>
</body>
</html>
